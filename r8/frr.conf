frr version 10.5.1
frr defaults traditional
hostname r8
service integrated-vtysh-config
!
interface eth1
 ip address 10.0.48.2/30
 ip ospf network point-to-point
!
interface eth2
 ip address 10.0.78.2/30
 ip ospf network point-to-point
!
interface eth3
 ip address 192.168.8.1/24
 ip ospf network point-to-point
!
router ospf
 ospf router-id 8.8.8.8
 passive-interface eth3
 network 10.0.48.0/30 area 0.0.0.0
 network 10.0.78.0/30 area 0.0.0.0
 network 192.168.8.0/24 area 0.0.0.0
!
line vty
!
