frr version 10.5.1
frr defaults traditional
hostname r5
service integrated-vtysh-config
!
interface eth1
 ip address 10.0.15.2/30
 ip ospf network point-to-point
!
interface eth2
 ip address 10.0.56.1/30
 ip ospf network point-to-point
!
router ospf
 ospf router-id 5.5.5.5
 network 10.0.15.0/30 area 0.0.0.0
 network 10.0.56.0/30 area 0.0.0.0
!
line vty
!
