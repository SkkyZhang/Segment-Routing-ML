frr version 10.5.1
frr defaults traditional
hostname r6
service integrated-vtysh-config
!
interface eth1
 ip address 10.0.56.2/30
 ip ospf network point-to-point
!
interface eth2
 ip address 10.0.67.1/30
 ip ospf network point-to-point
!
interface eth3
 ip address 10.0.36.2/30
 ip ospf network point-to-point
!
router ospf
 ospf router-id 6.6.6.6
 network 10.0.36.0/30 area 0.0.0.0
 network 10.0.56.0/30 area 0.0.0.0
 network 10.0.67.0/30 area 0.0.0.0
!
line vty
!
