name: srte8

topology:
  groups:
    routers:
      kind: linux
      image: quay.io/frrouting/frr:10.5.1
    hosts:
      kind: linux
      image: wbitt/network-multitool:3.22.2

  nodes:
    r1:
      group: routers
      binds:
        - r1/daemons:/etc/frr/daemons
        - r1/frr.conf:/etc/frr/frr.conf
        - r1/vtysh.conf:/etc/frr/vtysh.conf

    r2:
      group: routers
      binds:
        - r2/daemons:/etc/frr/daemons
        - r2/frr.conf:/etc/frr/frr.conf
        - r2/vtysh.conf:/etc/frr/vtysh.conf

    r3:
      group: routers
      binds:
        - r3/daemons:/etc/frr/daemons
        - r3/frr.conf:/etc/frr/frr.conf
        - r3/vtysh.conf:/etc/frr/vtysh.conf

    r4:
      group: routers
      binds:
        - r4/daemons:/etc/frr/daemons
        - r4/frr.conf:/etc/frr/frr.conf
        - r4/vtysh.conf:/etc/frr/vtysh.conf

    r5:
      group: routers
      binds:
        - r5/daemons:/etc/frr/daemons
        - r5/frr.conf:/etc/frr/frr.conf
        - r5/vtysh.conf:/etc/frr/vtysh.conf

    r6:
      group: routers
      binds:
        - r6/daemons:/etc/frr/daemons
        - r6/frr.conf:/etc/frr/frr.conf
        - r6/vtysh.conf:/etc/frr/vtysh.conf

    r7:
      group: routers
      binds:
        - r7/daemons:/etc/frr/daemons
        - r7/frr.conf:/etc/frr/frr.conf
        - r7/vtysh.conf:/etc/frr/vtysh.conf

    r8:
      group: routers
      binds:
        - r8/daemons:/etc/frr/daemons
        - r8/frr.conf:/etc/frr/frr.conf
        - r8/vtysh.conf:/etc/frr/vtysh.conf

    h1:
      group: hosts
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.1.2/24 dev eth1
        - ip route replace 192.168.8.0/24 via 192.168.1.1 dev eth1

    h2:
      group: hosts
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.8.2/24 dev eth1
        - ip route replace 192.168.1.0/24 via 192.168.8.1 dev eth1

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r2:eth2", "r3:eth1"]
    - endpoints: ["r3:eth2", "r4:eth1"]
    - endpoints: ["r4:eth2", "r8:eth1"]
    - endpoints: ["r1:eth2", "r5:eth1"]
    - endpoints: ["r5:eth2", "r6:eth1"]
    - endpoints: ["r6:eth2", "r7:eth1"]
    - endpoints: ["r7:eth2", "r8:eth2"]
    - endpoints: ["r3:eth3", "r6:eth3"]
    - endpoints: ["h1:eth1", "r1:eth3"]
    - endpoints: ["h2:eth1", "r8:eth3"]
